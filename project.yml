name: Stillreader
options:
  bundleIdPrefix: com.stillreader
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0
  Yams:
    url: https://github.com/jpsim/Yams
    from: 5.1.3

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
    Release:
      CODE_SIGN_STYLE: Automatic

targets:
  Stillreader:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Stillreader
    dependencies:
      - package: GRDB
        product: GRDB
      - package: Yams
      - target: StillreaderShareExtension
        embed: true
        codeSign: true
        destinationFilters: [iOS]
    entitlements:
      path: Stillreader.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stillreader.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Stillreader
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.news
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Stillreader.entitlements
      configs:
        Debug:
          CODE_SIGNING_ALLOWED[sdk=macosx*]: NO
        Release:
          CODE_SIGN_ENTITLEMENTS: Stillreader.entitlements

  StillreaderTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - path: StillreaderTests
    dependencies:
      - target: Stillreader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stillreader.app.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Stillreader.app/Contents/MacOS/Stillreader
        TEST_HOST[sdk=iphone*]: $(BUILT_PRODUCTS_DIR)/Stillreader.app/Stillreader
        TEST_HOST[sdk=iphonesimulator*]: $(BUILT_PRODUCTS_DIR)/Stillreader.app/Stillreader

  StillreaderShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: StillreaderShareExtension
      - path: Stillreader/Core/Markdown
      - path: Stillreader/Core/Storage
      - path: Stillreader/Core/Utilities
      - path: Stillreader/Models
    dependencies:
      - package: Yams
    entitlements:
      path: StillreaderShareExtension/ShareExtension.entitlements
    info:
      path: StillreaderShareExtension/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stillreader.app.share
        CODE_SIGN_ENTITLEMENTS: StillreaderShareExtension/ShareExtension.entitlements
        SKIP_INSTALL: YES

schemes:
  Stillreader:
    build:
      targets:
        Stillreader: all
    test:
      targets:
        - StillreaderTests
