name: Stillreader
options:
  bundleIdPrefix: com.stillreader
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0
  Yams:
    url: https://github.com/jpsim/Yams
    from: 5.1.3

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: K2967B5G85
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
    Release:
      CODE_SIGN_STYLE: Automatic

targets:
  Stillreader:
    type: application
    platform: iOS
    sources:
      - path: Stillreader
      - path: Stillreader/Resources
        buildPhase: resources
    dependencies:
      - package: GRDB
        product: GRDB
      - package: Yams
      - target: StillreaderShareExtension
        embed: true
        codeSign: true
        destinationFilters: [iOS]
    entitlements:
      path: Stillreader.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stillreader.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Stillreader
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.news
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Stillreader.entitlements
      configs:
        Release:
          CODE_SIGN_ENTITLEMENTS: Stillreader.entitlements

  StillreaderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StillreaderTests
    dependencies:
      - target: Stillreader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stillreader.app.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Stillreader.app/Stillreader

  StillreaderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StillreaderUITests
    dependencies:
      - target: Stillreader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stillreader.app.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Stillreader

  StillreaderShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: StillreaderShareExtension
      - path: Stillreader/Core/Markdown
      - path: Stillreader/Core/Storage
        excludes:
          - "GitHubStorageAdapter.swift"
          - "ICloudStorageAdapter.swift"
          - "AppGroupReconciler.swift"
      - path: Stillreader/Core/Utilities
        excludes:
          - "AppMetaStore.swift"
          - "AsyncTimeout.swift"
          - "RichTextFormatter.swift"
          - "StatePruner.swift"
      - path: Stillreader/Models
        excludes:
          - "AppAppearance.swift"
          - "CachedArticle.swift"
          - "InboxItem.swift"
          - "NavigationRoutes.swift"
          - "RootTab.swift"
    dependencies:
      - package: Yams
    entitlements:
      path: StillreaderShareExtension/ShareExtension.entitlements
    info:
      path: StillreaderShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Stillreader
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stillreader.app.share
        CODE_SIGN_ENTITLEMENTS: StillreaderShareExtension/ShareExtension.entitlements
        SKIP_INSTALL: YES

schemes:
  Stillreader:
    build:
      targets:
        Stillreader: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - StillreaderTests
        - StillreaderUITests
